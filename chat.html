<!DOCTYPE html>
<html>
<head>
    <title>Achievers AI Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #343541;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* HEADER */
        #header {
            background: #202123;
            color: white;
            padding: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        #header img {
            width: 30px;
            margin-right: 10px;
        }

        /* CHAT BOX */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message-row {
            display: flex;
            margin-bottom: 12px;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .user-row {
            justify-content: flex-end;
        }

        .message {
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 65%;
            font-size: 14px;
            line-height: 1.4;
        }

        .bot {
            background: #444654;
            color: white;
        }

        .user {
            background: #10a37f;
            color: white;
        }

        /* INPUT AREA */
        #input-area {
            display: flex;
            padding: 10px;
            background: #202123;
        }

        #input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            background: #40414f;
            color: white;
        }

        button {
            padding: 12px;
            background: #10a37f;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* TYPING ANIMATION */
        #typing {
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div id="header">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
    Achievers AI Assistant
</div>

<!-- CHAT AREA -->
<div id="chat-box"></div>

<!-- INPUT -->
<div id="input-area">
    <input id="input" placeholder="Ask your question...">
    <button onclick="sendMessage()">➤</button>
</div>

<script>
function addMessage(text, type) {
    let box = document.getElementById("chat-box");

    let row = document.createElement("div");
    row.className = "message-row " + (type === "bot" ? "bot-row" : "user-row");

    let msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;

    row.appendChild(msg);
    box.appendChild(row);

    box.scrollTop = box.scrollHeight;
}

function showTyping() {
    let box = document.getElementById("chat-box");

    let row = document.createElement("div");
    row.id = "typing";
    row.className = "message-row bot-row";

    let msg = document.createElement("div");
    msg.className = "message bot";
    msg.innerText = "Typing...";

    row.appendChild(msg);
    box.appendChild(row);
}

function removeTyping() {
    let t = document.getElementById("typing");
    if (t) t.remove();
}

function sendMessage() {
    let input = document.getElementById("input");
    let message = input.value;

    if (message.trim() === "") return;

    addMessage(message, "user");
    input.value = "";

    showTyping();

    let xhr = new XMLHttpRequest();
    xhr.open("POST", "chat", true);
    xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");

    xhr.onload = function () {
        removeTyping();
        addMessage(xhr.responseText, "bot");
    };

    xhr.send("message=" + encodeURIComponent(message));
}
</script>

</body>
</html>
